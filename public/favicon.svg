  <!-- Window left -->
  <rect x="9.5" y="17" width="4" height="3.5" rx="0.5" fill="#1e5fa8" opacity="0.7"/>
  <!-- Window right -->
  <rect x="18.5" y="17" width="4" height="3.5" rx="0.5" fill="#1e5fa8" opacity="0.7"/>
  <!-- Chimney -->
